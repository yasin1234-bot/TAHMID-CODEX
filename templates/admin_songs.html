<h2>Song List</h2>
<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Song Name</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        {% for song in songs %}
        <tr>
            <td>{{ song.id }}</td>
            <td>{{ song.name }}</td>
            <td>
                <a href="/static/uploads/{{ song.name }}" target="_blank">Play</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% if not songs %}
<p>No songs found in database.</p>
{% endif %}
